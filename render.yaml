services:
  - type: web
    name: gruha-alankara-api
    runtime: python
    rootDir: backend
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: DATABASE_URL
        value: sqlite:///./gruha.db
      - key: ALLOWED_ORIGINS
        value: https://gruha-alankara-interior-design-plat.vercel.app,https://gruha-alankara-interior-design-platform.onrender.com
